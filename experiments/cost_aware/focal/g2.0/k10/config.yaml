data:
  data_dir: data/processed
  horizon: 10
logging:
  save_dir: experiments/cost_aware/focal
loss:
  alpha: null
  gamma: 2.0
  type: focal
model:
  conv_filters: 32
  inception_filters: 64
  leaky_relu_slope: 0.01
  lstm_hidden: 64
  lstm_layers: 1
  name: deeplob
  num_classes: 3
training:
  adam_epsilon: 1.0
  batch_size: 64
  early_stopping_patience: 20
  learning_rate: 0.01
  max_epochs: 200
  seed: 42
  warmup_epochs: 0
