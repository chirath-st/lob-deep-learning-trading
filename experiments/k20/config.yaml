data:
  dataset: fi2010
  horizon: 20
  lookback: 100
  normalization: DecPre
  num_levels: 10
  setup: 2
logging:
  log_every_n_steps: 100
  save_dir: experiments/
  wandb_project: deeplob-replication
model:
  conv_filters: 32
  inception_filters: 64
  leaky_relu_slope: 0.01
  lstm_hidden: 64
  lstm_layers: 1
  name: deeplob
  num_classes: 3
training:
  adam_epsilon: 1.0
  batch_size: 64
  early_stopping_patience: 20
  learning_rate: 0.01
  max_epochs: 200
  optimizer: adam
  seed: 42
