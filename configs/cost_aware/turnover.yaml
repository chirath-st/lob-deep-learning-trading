# Cost-Aware Training: Turnover-Penalized Loss
# CE + explicit penalty for position changes between consecutive timesteps.
# Override lambda_turnover via --loss-param CLI arg.
#
# IMPORTANT: Uses sequential data loading (shuffle=False) because the
# turnover penalty requires consecutive samples to be consecutive in time.

model:
  name: deeplob
  num_classes: 3
  conv_filters: 32
  inception_filters: 64
  lstm_hidden: 64
  lstm_layers: 1
  leaky_relu_slope: 0.01

loss:
  type: turnover
  lambda_turnover: 0.1      # overridden by --loss-param; sweep: 0.01, 0.1, 0.5

data:
  data_dir: data/processed
  horizon: 10

training:
  batch_size: 64
  learning_rate: 0.01       # same as original DeepLOB
  adam_epsilon: 1.0
  warmup_epochs: 0
  max_epochs: 200
  early_stopping_patience: 20
  seed: 42

logging:
  save_dir: experiments/cost_aware/turnover
