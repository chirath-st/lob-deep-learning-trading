# Cost-Aware Training: Weighted Cross-Entropy
# Up-weights the stationary class to discourage unnecessary trade predictions.
# Override stationary_weight via --loss-param CLI arg.

model:
  name: deeplob
  num_classes: 3
  conv_filters: 32
  inception_filters: 64
  lstm_hidden: 64
  lstm_layers: 1
  leaky_relu_slope: 0.01

loss:
  type: weighted_ce
  stationary_weight: 2.0    # overridden by --loss-param; sweep: 2.0, 3.0, 5.0

data:
  data_dir: data/processed
  horizon: 10               # overridden by --horizon

training:
  batch_size: 64
  learning_rate: 0.01       # same as original DeepLOB
  adam_epsilon: 1.0          # same as original DeepLOB
  warmup_epochs: 0
  max_epochs: 200
  early_stopping_patience: 20
  seed: 42

logging:
  save_dir: experiments/cost_aware/weighted_ce
