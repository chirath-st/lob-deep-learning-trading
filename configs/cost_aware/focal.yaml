# Cost-Aware Training: Focal Loss
# Down-weights easy/confident predictions to focus on hard boundary cases.
# Override gamma via --loss-param CLI arg.

model:
  name: deeplob
  num_classes: 3
  conv_filters: 32
  inception_filters: 64
  lstm_hidden: 64
  lstm_layers: 1
  leaky_relu_slope: 0.01

loss:
  type: focal
  gamma: 2.0                # overridden by --loss-param; sweep: 1.0, 2.0, 3.0
  alpha: null               # no per-class weights (focal handles imbalance implicitly)

data:
  data_dir: data/processed
  horizon: 10

training:
  batch_size: 64
  learning_rate: 0.01       # same as original DeepLOB
  adam_epsilon: 1.0
  warmup_epochs: 0
  max_epochs: 200
  early_stopping_patience: 20
  seed: 42

logging:
  save_dir: experiments/cost_aware/focal
