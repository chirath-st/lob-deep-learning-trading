# Ablation: CNN-Only — No Inception, No Temporal Modeling
# Tests what the CNN spatial feature extraction alone can achieve.
# Architecture: CNN Block 1-3 → Global Avg Pool → FC → (B, 3)
#
# 📚 Study: If this performs much worse than DeepLOB, it confirms that
#    temporal modeling (LSTM/attention) is critical for LOB prediction.
#    If it performs surprisingly well, the CNN is doing most of the work.

model:
  name: cnn_only
  num_classes: 3
  # CNN blocks (same as DeepLOB)
  conv_filters: 32
  leaky_relu_slope: 0.01
  # inception_filters not used by CNN-Only, but included for model factory compatibility
  inception_filters: 64

data:
  dataset: fi2010
  normalization: DecPre
  lookback: 100
  horizon: 10             # overridden by --horizon CLI arg
  num_levels: 10
  setup: 2

training:
  batch_size: 64
  learning_rate: 0.001     # same as extension for fair comparison
  optimizer: adam
  adam_epsilon: 1.0e-8
  warmup_epochs: 0         # no Transformer — warmup not needed
  max_epochs: 200
  early_stopping_patience: 20
  seed: 42

logging:
  wandb_project: deeplob-extension
  save_dir: experiments/ablation/cnn_only/
  log_every_n_steps: 100
